name: clowthex
description: ClowtheX - تطبيق إدارة محل الملابس الرجالية الاحترافي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI
  google_fonts: ^8.1.0
  fl_chart: ^0.66.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animate_do: ^3.1.2

  # Barcode & QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  # PDF & Excel & Print
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3

  # File & Share
  path_provider: ^2.1.2
  share_plus: ^9.0.0
  file_picker: ^8.0.0+1
  permission_handler: ^11.2.0

  # Splash screen
  flutter_native_splash: ^2.3.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  collection: ^1.18.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/splash_logo.png
    - assets/images/app_icon.png

flutter_native_splash:
  color: "#1A1A1A"
  image: assets/images/splash_logo.png
  color_dark: "#0A0A0A"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#1A1A1A"
    image: assets/images/splash_logo.png
    icon_background_color: "#1A1A1A"
